<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>IBS CRM</title>
<!-- PWA Meta Tags -->
<meta name="application-name" content="IBS CRM">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IBS CRM">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0D47A1">
<meta name="msapplication-TileColor" content="#0D47A1">
<meta name="format-detection" content="telephone=no">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#0D47A1;--c2:#1976D2;--c3:#42A5F5;--c4:#E3F2FD;
  --acc:#FF6F00;--acc2:#FFB300;--acc3:#FFF8E1;
  --gr:#43A047;--gr2:#C8E6C9;
  --re:#E53935;--re2:#FFEBEE;
  --pu:#7B1FA2;--pu2:#F3E5F5;
  --bg:#F5F5F5;--card:#FFFFFF;--border:#E0E0E0;--t1:#212121;--t2:#757575;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);min-height:100vh;min-height:100dvh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
#app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0D47A1 0%,#1976D2 50%,#42A5F5 100%)}
.login-box{background:#fff;border-radius:16px;padding:2.5rem 2rem;width:min(400px,90%);box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.login-box h1{font-size:28px;color:var(--c1);margin-bottom:6px}
.login-box h1 span{color:var(--acc)}
.login-box p{font-size:14px;color:var(--t2);margin-bottom:2rem}
.agent-btn{display:block;width:100%;padding:16px;margin-bottom:12px;border:2px solid var(--border);border-radius:12px;background:#fff;cursor:pointer;transition:.2s;text-align:left}
.agent-btn:hover{border-color:var(--c2);background:var(--c4)}
.agent-btn .agent-name{font-size:16px;font-weight:600;color:var(--t1)}
.agent-btn .agent-role{font-size:13px;color:var(--t2);margin-top:2px}
.agent-btn .agent-icon{width:44px;height:44px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;margin-right:12px;flex-shrink:0}
nav{background:var(--c1);padding:0 1rem;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.nav-brand{color:#fff;font-size:15px;font-weight:500;padding:14px 0;margin-right:1.5rem;letter-spacing:.3px}
.nav-brand span{color:var(--acc2);font-weight:700}
.nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto}
.nav-tab{background:none;border:none;color:rgba(255,255,255,.7);padding:14px 14px;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;transition:.2s;white-space:nowrap}
.nav-tab.active{color:#fff;border-bottom-color:var(--acc2)}
.nav-tab:hover:not(.active){color:#fff;background:rgba(255,255,255,.1)}
.nav-user{display:flex;align-items:center;gap:8px;margin-left:auto;padding:0 8px}
.nav-user .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.nav-user .uname{color:rgba(255,255,255,.9);font-size:13px}
.nav-user .logout-btn{background:none;border:none;color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;padding:4px 8px;border-radius:4px}
.nav-user .logout-btn:hover{color:#fff;background:rgba(255,255,255,.1)}
.content{flex:1;padding:1.25rem;max-width:1100px;margin:0 auto;width:100%}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.card-title{font-size:14px;font-weight:500;color:var(--t1);margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
.stat{background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:.875rem 1rem}
.stat-label{font-size:12px;color:var(--t2);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:500;color:var(--t1)}
.stat-sub{font-size:11px;color:var(--t2);margin-top:2px}
.badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.badge.lead{background:#E3F2FD;color:#0D47A1}.badge.prospect{background:var(--acc3);color:#E65100}.badge.cliente{background:var(--gr2);color:#1B5E20}
.badge.freddo{background:#F5F5F5;color:#616161}.badge.caldo{background:#FFE0B2;color:#E65100}.badge.chiuso{background:var(--gr2);color:#1B5E20}.badge.perso{background:var(--re2);color:#B71C1C}
.badge.inviata{background:#E8EAF6;color:#1A237E}.badge.accettata{background:var(--gr2);color:#1B5E20}.badge.rifiutata{background:var(--re2);color:#B71C1C}
.badge.attesa{background:var(--acc3);color:#E65100}.badge.confermata{background:var(--gr2);color:#1B5E20}.badge.completata{background:#E3F2FD;color:#0D47A1}.badge.annullata{background:var(--re2);color:#B71C1C}
.badge.chiusa_visita{background:var(--pu2);color:#7B1FA2}
.badge.offerta{background:#E8EAF6;color:#1A237E}.badge.followup{background:var(--gr2);color:#1B5E20}.badge.conoscitiva{background:var(--acc3);color:#E65100}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;font-weight:500;color:var(--t2);text-align:left;padding:6px 10px;border-bottom:0.5px solid var(--border);white-space:nowrap}
td{padding:9px 10px;border-bottom:0.5px solid var(--border);color:var(--t1);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#F5F5F5}
.btn{display:inline-flex;align-items:center;gap:5px;border:0.5px solid var(--border);background:var(--card);color:var(--t1);font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer;transition:.15s}
.btn:hover{background:#F5F5F5}
.btn.primary{background:var(--c1);color:#fff;border-color:var(--c1)}.btn.primary:hover{background:var(--c2)}
.btn.danger{background:var(--re2);color:var(--re);border-color:transparent}
.btn.success{background:var(--gr2);color:#1B5E20;border-color:transparent}
.btn.sm{padding:4px 10px;font-size:12px;border-radius:6px}
.btn.orange{background:var(--acc);color:#fff;border-color:var(--acc)}.btn.orange:hover{background:#E65100}
.btn.purple{background:var(--pu);color:#fff;border-color:var(--pu)}.btn.purple:hover{background:#6A1B9A}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.full{grid-template-columns:1fr}
label{display:block;font-size:12px;color:var(--t2);margin-bottom:4px}
input,select,textarea{width:100%;font-size:13px;padding:8px 10px;border:0.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--t1);font-family:inherit}
textarea{resize:vertical;min-height:70px}
input:focus,select:focus,textarea:focus{outline:2px solid var(--c3);border-color:transparent}
.pipeline{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.pipeline-col{background:#F5F5F5;border-radius:10px;padding:.75rem}
.pipeline-col-title{font-size:11px;font-weight:500;color:var(--t2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between}
.pipeline-card{background:var(--card);border:0.5px solid var(--border);border-radius:8px;padding:.75rem;margin-bottom:8px;font-size:12px;cursor:pointer;transition:.15s}
.pipeline-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.pipeline-card .name{font-weight:500;font-size:13px;margin-bottom:4px;color:var(--t1)}
.pipeline-card .val{color:var(--acc);font-weight:500}
.pipeline-card .info{color:var(--t2);margin-top:3px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-name{font-size:11px;color:var(--t2);text-align:center;padding:4px;font-weight:500}
.cal-day{min-height:60px;border:0.5px solid var(--border);border-radius:6px;padding:4px;background:var(--card);font-size:11px}
.cal-day.today{border-color:var(--c2);background:var(--c4)}
.cal-day.other-month{opacity:.4}
.cal-day .day-num{font-weight:500;color:var(--t2);margin-bottom:2px;font-size:12px}
.cal-event{background:var(--c1);color:#fff;border-radius:3px;padding:1px 4px;margin-bottom:2px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-event.offerta{background:var(--acc)}.cal-event.followup{background:var(--gr)}
.search-bar{display:flex;gap:8px;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.empty{color:var(--t2);font-size:13px;text-align:center;padding:2rem;opacity:.7}
.notif{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--gr);color:#fff;padding:.75rem 1.25rem;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:.3s;pointer-events:none}
.notif.show{opacity:1}
.voice-area{border:0.5px solid var(--border);border-radius:10px;padding:1rem;background:#F5F5F5;margin-top:8px}
.voice-controls{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mic-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:.2s;flex-shrink:0}
.mic-btn.idle{background:var(--c4);color:var(--c1)}
.mic-btn.recording{background:var(--re);color:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(229,57,53,.4)}50%{box-shadow:0 0 0 8px rgba(229,57,53,0)}}
.voice-status{font-size:12px;color:var(--t2)}.voice-status.recording{color:var(--re);font-weight:500}
.note-post-card{background:var(--card);border:0.5px solid var(--border);border-radius:8px;padding:.875rem;margin-bottom:8px}
.note-post-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.note-post-label{font-size:11px;font-weight:500;color:var(--c1);margin-bottom:4px}
.note-post-text{font-size:13px;color:var(--t1);line-height:1.6}
#modal-layer{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:200;overflow-y:auto}
#modal-layer.open{display:flex}
.modal{background:var(--card);border-radius:14px;padding:1.25rem;width:min(560px,100%);border:0.5px solid var(--border)}
.modal-title{font-size:15px;font-weight:500;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
.modal-title button{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t2);line-height:1;padding:0 4px}
.upload-area{border:2px dashed var(--border);border-radius:12px;padding:2rem;text-align:center;cursor:pointer;transition:.2s;background:#FAFAFA}
.upload-area:hover,.upload-area.dragover{border-color:var(--c2);background:var(--c4)}
.tools-bar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 0;border-top:0.5px solid var(--border);margin-top:1rem}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}.pipeline{grid-template-columns:repeat(2,1fr)}.form-row{grid-template-columns:1fr}.nav-user .uname{display:none}}
@media(max-width:480px){.pipeline{grid-template-columns:1fr}.cal-day{min-height:40px}.nav-tab{padding:12px 10px;font-size:12px}.content{padding:.75rem}.stats{gap:6px}.stat{padding:.625rem .75rem}.stat-val{font-size:18px}.card{padding:.75rem 1rem}.btn{padding:6px 12px;font-size:12px}.modal{padding:1rem;border-radius:12px}}
@media(max-width:380px){.nav-brand{font-size:13px;margin-right:.75rem}.nav-tab{padding:12px 8px;font-size:11px}}
/* Standalone PWA mode */
@media(display-mode:standalone){nav{padding-top:env(safe-area-inset-top)}body{padding-top:0}}
</style>
</head>
<body>
<div id="app">
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <h1>IBS <span>CRM</span></h1>
      <p>Seleziona il tuo profilo agente per accedere</p>
      <button class="agent-btn" onclick="loginAgent('Claudio Speranza')">
        <div style="display:flex;align-items:center">
          <div class="agent-icon" style="background:linear-gradient(135deg,#0D47A1,#42A5F5)">CS</div>
          <div><div class="agent-name">Claudio Speranza</div><div class="agent-role">Agente commerciale</div></div>
        </div>
      </button>
      <button class="agent-btn" onclick="loginAgent('Luca Bisconti')">
        <div style="display:flex;align-items:center">
          <div class="agent-icon" style="background:linear-gradient(135deg,#FF6F00,#FFB300)">LB</div>
          <div><div class="agent-name">Luca Bisconti</div><div class="agent-role">Agente commerciale</div></div>
        </div>
      </button>
    </div>
  </div>
  <div id="main-app" style="display:none">
    <nav>
      <div class="nav-brand">IBS <span>CRM</span></div>
      <div class="nav-tabs">
        <button class="nav-tab active" onclick="showTab('dashboard')" id="tab-dashboard">Dashboard</button>
        <button class="nav-tab" onclick="showTab('clienti')" id="tab-clienti">Clienti</button>
        <button class="nav-tab" onclick="showTab('lead')" id="tab-lead">Lead &amp; Pipeline</button>
        <button class="nav-tab" onclick="showTab('offerte')" id="tab-offerte">Offerte</button>
        <button class="nav-tab" onclick="showTab('visite')" id="tab-visite">Visite</button>
        <button class="nav-tab" onclick="showTab('storico')" id="tab-storico">Storico Visite</button>
      </div>
      <div class="nav-user">
        <span id="sync-indicator" title="Stato sincronizzazione" style="font-size:14px;cursor:help">&#9729;</span>
        <div class="avatar" id="nav-avatar"></div>
        <span class="uname" id="nav-uname"></span>
        <button class="logout-btn" onclick="logout()">Esci</button>
      </div>
    </nav>
    <div class="content" id="main-content"></div>
  </div>
</div>
<div id="modal-layer" onclick="handleModalBgClick(event)">
  <div class="modal" id="modal-box">
    <div class="modal-title"><span id="modal-title-text"></span><button onclick="closeModal()">&times;</button></div>
    <div id="modal-body"></div>
  </div>
</div>
<div class="notif" id="notif"></div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const KEY='ibs_crm_v4';
const AGENTS=['Claudio Speranza','Luca Bisconti'];
let currentAgent='';
let DB={clienti:[],lead:[],offerte:[],visite:[]};
let recog=null,isRecording=false,finalText='';
let firebaseReady=false;
let db=null;
let isSaving=false;

// ======== FIREBASE INIT ========
const firebaseConfig={
  apiKey:"AIzaSyCuQUZB-uP6bHKn442jqDo7UlctkXiVD_k",
  authDomain:"ibs-crm-d3768.firebaseapp.com",
  projectId:"ibs-crm-d3768",
  storageBucket:"ibs-crm-d3768.firebasestorage.app",
  messagingSenderId:"137376116158",
  appId:"1:137376116158:web:5e445513a26e4d54a21def"
};

try{
  firebase.initializeApp(firebaseConfig);
  db=firebase.firestore();
  firebaseReady=true;
  console.log('Firebase connected');
}catch(e){
  console.warn('Firebase init failed, using local storage only',e);
  firebaseReady=false;
}

// ======== SAVE: writes to Firestore + localStorage backup ========
function save(){
  try{localStorage.setItem(KEY,JSON.stringify(DB))}catch(e){}
  if(!firebaseReady||!db)return;
  isSaving=true;
  const batch=db.batch();
  ['clienti','lead','offerte','visite'].forEach(col=>{
    batch.set(db.collection('crm').doc(col),{items:JSON.parse(JSON.stringify(DB[col])),updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedBy:currentAgent||'unknown'});
  });
  batch.commit().then(()=>{setTimeout(()=>{isSaving=false;},500);})
    .catch(e=>{console.warn('Firebase save error:',e);isSaving=false;});
}

// ======== LOAD: Firebase is ALWAYS the source of truth ========
function load(){
  if(!firebaseReady||!db){loadFromLocal();return;}
  // Try Firebase first
  const cols=['clienti','lead','offerte','visite'];
  let loaded=0,hasFirebase=false;
  cols.forEach(col=>{
    db.collection('crm').doc(col).get().then(doc=>{
      loaded++;
      if(doc.exists&&doc.data().items&&doc.data().items.length>0){
        DB[col]=doc.data().items;hasFirebase=true;
      }
      if(loaded===4){
        if(hasFirebase){
          // Firebase has data — use it, update local cache
          try{localStorage.setItem(KEY,JSON.stringify(DB))}catch(e){}
          refreshCurrentView();
          showSyncStatus('Dati sincronizzati dal cloud');
        }else{
          // Firebase empty — check if local data exists to migrate
          const local=loadLocalSilent();
          if(local){DB=local;save();showSyncStatus('Dati migrati nel cloud');}
          else{seedData();}
          refreshCurrentView();
        }
        startRealtimeSync();
      }
    }).catch(e=>{
      loaded++;console.warn('Firebase load error ('+col+'):',e);
      if(loaded===4){loadFromLocal();startRealtimeSync();}
    });
  });
}

// Offline fallback
function loadFromLocal(){
  try{const d=localStorage.getItem(KEY);
    if(d){DB=JSON.parse(d);migrateAgents();}else seedData();
  }catch(e){seedData()}
}

// Read local without modifying DB (for migration check)
function loadLocalSilent(){
  try{const d=localStorage.getItem(KEY)||localStorage.getItem('ibs_crm_v3');
    if(d){const p=JSON.parse(d);if(p.clienti&&p.clienti.length>0){migrateAgentsObj(p);return p;}}
  }catch(e){}return null;
}

function migrateAgents(){
  DB.visite.forEach(v=>{if(!v.agente)v.agente='Claudio Speranza'});
  DB.offerte.forEach(o=>{if(!o.agente)o.agente='Claudio Speranza'});
  DB.clienti.forEach(c=>{if(!c.agente)c.agente='Claudio Speranza'});
  DB.lead.forEach(l=>{if(!l.agente)l.agente='Claudio Speranza'});
}
function migrateAgentsObj(o){
  (o.visite||[]).forEach(v=>{if(!v.agente)v.agente='Claudio Speranza'});
  (o.offerte||[]).forEach(v=>{if(!v.agente)v.agente='Claudio Speranza'});
  (o.clienti||[]).forEach(v=>{if(!v.agente)v.agente='Claudio Speranza'});
  (o.lead||[]).forEach(v=>{if(!v.agente)v.agente='Claudio Speranza'});
}

// ======== REALTIME SYNC ========
function startRealtimeSync(){
  if(!firebaseReady||!db)return;
  ['clienti','lead','offerte','visite'].forEach(col=>{
    db.collection('crm').doc(col).onSnapshot(doc=>{
      if(isSaving)return;
      if(doc.exists&&doc.data().items){
        const remote=doc.data().items;
        if(JSON.stringify(DB[col])!==JSON.stringify(remote)){
          DB[col]=remote;
          try{localStorage.setItem(KEY,JSON.stringify(DB))}catch(e){}
          refreshCurrentView();
          showSyncStatus('Aggiornamento ricevuto');
        }
      }
    },e=>console.warn('Realtime sync error ('+col+'):',e));
  });
}

function refreshCurrentView(){
  const activeTab=document.querySelector('.nav-tab.active');
  if(!activeTab)return;
  const t=activeTab.id.replace('tab-','');
  const map={dashboard:renderDashboard,clienti:renderClienti,lead:renderLead,offerte:renderOfferte,visite:renderVisite,storico:renderStorico};
  if(map[t])map[t]();
}

function showSyncStatus(msg){
  const n=document.getElementById('notif');
  n.textContent='\u2601 '+msg;
  n.style.background='#1976D2';
  n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),2000);
  // Update navbar indicator
  const ind=document.getElementById('sync-indicator');
  if(ind){ind.textContent='\u2601';ind.style.color='#81D4FA';ind.title='Sincronizzato con Firebase';}
}
function seedData(){
  DB.clienti=[
    {id:1,nome:'Autotrasporti Lazio Srl',referente:'Marco Rossi',posizioneContatto:'Responsabile Acquisti',tel:'06-1234567',email:'m.rossi@autolazio.it',settore:'Trasporti',citta:'Roma',note:'Cliente fidelizzato, rinnovo batterie ogni 18 mesi',tags:['prioritario'],data:'2024-01-15',agente:'Claudio Speranza'},
    {id:2,nome:'Carrozzeria Toscana',referente:'Giulia Bianchi',posizioneContatto:'Titolare',tel:'055-9876543',email:'info@carrtoscana.it',settore:'Automotive',citta:'Firenze',note:'Acquisti frequenti batterie auto',tags:[],data:'2024-03-02',agente:'Luca Bisconti'},
    {id:3,nome:'Magazzini Umbria SpA',referente:'Luigi Neri',posizioneContatto:'Direttore Operativo',tel:'075-5553210',email:'l.neri@magumbria.it',settore:'Logistica',citta:'Perugia',note:'Flotta di 40 mezzi, contratto quadro',tags:['prioritario','flotta'],data:'2024-05-20',agente:'Claudio Speranza'},

// VOICE
function initVoice(tid,sid,bid){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){document.getElementById(sid).textContent='Microfono non supportato';return;}stopVoice();finalText=document.getElementById(tid)?document.getElementById(tid).value:'';recog=new SR();recog.lang='it-IT';recog.continuous=true;recog.interimResults=true;recog.onresult=e=>{let interim='';let f=finalText;for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal){f+=(f?' ':'')+e.results[i][0].transcript.trim();finalText=f;}else interim+=e.results[i][0].transcript;}const ta=document.getElementById(tid);if(ta)ta.value=finalText+(interim?(' '+interim):'');const st=document.getElementById(sid);if(st)st.innerHTML=interim?'<span style="color:var(--re);font-weight:500">In ascolto...</span>':'<span style="color:var(--re);font-weight:500">In ascolto...</span>';};recog.onerror=()=>{setMicIdle(bid,sid);};recog.onend=()=>{if(isRecording)recog.start();else setMicIdle(bid,sid);};isRecording=true;recog.start();const btn=document.getElementById(bid);if(btn)btn.className='mic-btn recording';const st=document.getElementById(sid);if(st){st.textContent='In ascolto...';st.className='voice-status recording';}}
function stopVoice(){isRecording=false;if(recog){try{recog.stop();}catch(e){}recog=null;}}
function setMicIdle(bid,sid){isRecording=false;const btn=document.getElementById(bid);if(btn)btn.className='mic-btn idle';const st=document.getElementById(sid);if(st){st.textContent='Clicca il microfono per dettare';st.className='voice-status';}}
function toggleVoice(tid,sid,bid){if(isRecording){stopVoice();setMicIdle(bid,sid);}else initVoice(tid,sid,bid);}

function exportWeeklyReport(){

  const lun=new Date(oggi);lun.setDate(oggi.getDate()+diff);
  const dom=new Date(lun);dom.setDate(lun.getDate()+6);
  showModal('Report settimanale visite',`
<div class="form-row"><div><label>Da</label><input id="rep-da" type="date" value="${lun.toISOString().slice(0,10)}"></div><div><label>A</label><input id="rep-a" type="date" value="${dom.toISOString().slice(0,10)}"></div></div>

  <button class="btn" onclick="closeModal()">Annulla</button>

</div>`);

function genExcel(){
  const da=document.getElementById('rep-da').value,a=document.getElementById('rep-a').value,af=document.getElementById('rep-agente').value;
  let vis=DB.visite.filter(v=>v.data>=da&&v.data<=a);
  if(af)vis=vis.filter(v=>v.agente===af);
  vis.sort((a,b)=>a.data.localeCompare(b.data));
  const rows=[['AGENTE','DATA VISITA','RAGIONE SOCIALE','NOME CONTATTO','POSIZIONE CONTATTO','AZIONE DA INTRAPRENDERE','NOTE VISITA']];
  vis.forEach(v=>{const np=(v.notePost||[]).map(n=>n.testo).join(' | ');
    rows.push([v.agente||'',v.data,v.cliente,v.referente||'',v.posizioneContatto||'',v.azione||'',(v.note||'')+(np?' | Post: '+np:'')]);
  });
  const wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:20},{wch:14},{wch:30},{wch:20},{wch:22},{wch:30},{wch:40}];
  XLSX.utils.book_append_sheet(wb,ws,'Report Visite');
  XLSX.writeFile(wb,'IBS_Report_Visite_'+da+'_'+a+'.xlsx');
  closeModal();notify('Report esportato: '+vis.length+' visite');
}

function handleDrop(e){const f=e.dataTransfer.files[0];if(f)processFile(f);}
function handleFileSelect(e){const f=e.target.files[0];if(f)processFile(f);}

function processFile(file){
  if(typeof XLSX==='undefined'){alert('Libreria Excel non caricata');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);const wb=XLSX.read(data,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];const json=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!json.length){alert('File vuoto');return;}
      const colMap={};const headers=Object.keys(json[0]);
      headers.forEach(h=>{const hl=h.toLowerCase();
        if(/azienda|ragione.?sociale|societ|company|ditta|denominazione/i.test(hl))colMap.nome=h;
        else if(/referente|contatto|contact|nome.?contatto|persona/i.test(hl))colMap.referente=h;
        else if(/posizione|ruolo|carica|position|role|job/i.test(hl))colMap.posizioneContatto=h;
        else if(/tel|phone|cellulare|mobile/i.test(hl))colMap.tel=h;
        else if(/email|mail|e-mail|posta/i.test(hl))colMap.email=h;
        else if(/settore|sector|industry|categoria/i.test(hl))colMap.settore=h;
        else if(/citt|city|localit|comune/i.test(hl))colMap.citta=h;
        else if(/note|notes|commenti|osservazioni/i.test(hl))colMap.note=h;
        else if(/tag|etichett|label/i.test(hl))colMap.tags=h;
      });
      if(!colMap.nome&&headers.length)colMap.nome=headers[0];
      const preview=json.slice(0,5);
      let html='<div style="font-size:13px;font-weight:500;color:var(--t1);margin-bottom:8px">'+json.length+' righe trovate</div>';
      html+='<div style="font-size:11px;color:var(--t2);margin-bottom:8px">Mappatura: '+Object.entries(colMap).map(([k,v])=>'<strong>'+k+'</strong>&rarr;'+v).join(', ')+'</div>';
      html+='<div class="tbl-wrap" style="max-height:200px;overflow-y:auto"><table><thead><tr>';
      headers.slice(0,7).forEach(h=>{html+='<th>'+h+'</th>';});html+='</tr></thead><tbody>';
      preview.forEach(r=>{html+='<tr>';headers.slice(0,7).forEach(h=>{html+='<td style="font-size:12px">'+(r[h]||'')+'</td>';});html+='</tr>';});
      html+='</tbody></table></div>';
      html+='<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Annulla</button><button class="btn primary" onclick="execImport()">Importa '+json.length+' clienti</button></div>';
      document.getElementById('import-preview').innerHTML=html;
      window._importData={json,colMap};
    }catch(err){alert('Errore: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

function execImport(){
  const {json,colMap}=window._importData||{};if(!json)return;
  let imported=0;
  json.forEach(row=>{
    const nome=String(row[colMap.nome]||'').trim();if(!nome)return;
    if(DB.clienti.some(c=>c.nome.toLowerCase()===nome.toLowerCase()))return;
    DB.clienti.push({id:Date.now()+(Math.random()*10000|0),nome,referente:String(row[colMap.referente]||'').trim(),posizioneContatto:String(row[colMap.posizioneContatto]||'').trim(),tel:String(row[colMap.tel]||'').trim(),email:String(row[colMap.email]||'').trim(),settore:String(row[colMap.settore]||'').trim(),citta:String(row[colMap.citta]||'').trim(),note:String(row[colMap.note]||'').trim(),tags:colMap.tags?String(row[colMap.tags]||'').split(',').map(t=>t.trim()).filter(Boolean):[],data:new Date().toISOString().slice(0,10),agente:currentAgent});
    imported++;
  });
  save();closeModal();window._importData=null;
  const act=document.querySelector('.nav-tab.active').id.replace('tab-','');
  if(act==='clienti')renderClienti();else renderDashboard();
  notify(imported+' clienti importati!');
}

function genICS(){
  const da=document.getElementById('ics-da').value,a=document.getElementById('ics-a').value,af=document.getElementById('ics-agente').value;
  let vis=DB.visite.filter(v=>v.data>=da&&v.data<=a&&v.stato!=='annullata');
  if(af)vis=vis.filter(v=>v.agente===af);
  if(!vis.length){alert('Nessuna visita nel periodo selezionato');return;}
  let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//IBS CRM//Visite//IT\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\nX-WR-CALNAME:IBS Visite\r\nX-WR-TIMEZONE:Europe/Rome\r\n';
  vis.forEach(v=>{
    const ds=v.data.replace(/-/g,'');const[hh,mm]=(v.ora||'09:00').split(':');
    const dtS=ds+'T'+hh+mm+'00';const eH=String(Number(hh)+1).padStart(2,'0');const dtE=ds+'T'+eH+mm+'00';
    const uid='visita-'+v.id+'@ibscrm';const now=new Date().toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
    const tl={offerta:'Presentazione offerta',followup:'Follow-up',conoscitiva:'Visita conoscitiva'};
    const sum='[IBS] '+v.cliente+' - '+(tl[v.tipo]||v.tipo);
    const desc='Agente: '+(v.agente||'')+'\\nReferente: '+(v.referente||'')+'\\nPosizione: '+(v.posizioneContatto||'')+'\\nAzione: '+(v.azione||'')+'\\nNote: '+(v.note||'');
    ics+='BEGIN:VEVENT\r\nUID:'+uid+'\r\nDTSTAMP:'+now+'\r\nDTSTART;TZID=Europe/Rome:'+dtS+'\r\nDTEND;TZID=Europe/Rome:'+dtE+'\r\nSUMMARY:'+sum+'\r\nDESCRIPTION:'+desc+'\r\nLOCATION:'+(v.citta||'')+'\r\nSTATUS:CONFIRMED\r\nEND:VEVENT\r\n';
  });
  ics+='END:VCALENDAR\r\n';
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);const link=document.createElement('a');
  link.href=url;link.download='IBS_Visite_'+da+'_'+a+'.ics';
  document.body.appendChild(link);link.click();document.body.removeChild(link);URL.revokeObjectURL(url);
  closeModal();notify('Calendario esportato: '+vis.length+' visite');
}

// ======== STORICO VISITE ========
function getWeekNumber(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const start=new Date(d.getFullYear(),0,1);
  const diff=(d-start+(start.getTimezoneOffset()-d.getTimezoneOffset())*60000);
  const oneWeek=604800000;
  return Math.ceil((diff/oneWeek+start.getDay()+1)/7);
}

let storicoFiltri={agente:'',da:'',a:''};

function renderStorico(filtroAgente,filtroDa,filtroA){
  // Update filters
  if(typeof filtroAgente==='string')storicoFiltri.agente=filtroAgente;
  if(typeof filtroDa==='string')storicoFiltri.da=filtroDa;
  if(typeof filtroA==='string')storicoFiltri.a=filtroA;
  const af=storicoFiltri.agente;
  const da=storicoFiltri.da;
  const a=storicoFiltri.a;

  let chiuse=DB.visite.filter(v=>v.stato==='chiusa_visita').sort((a,b)=>b.data.localeCompare(a.data));
  if(af)chiuse=chiuse.filter(v=>v.agente===af);
  if(da)chiuse=chiuse.filter(v=>v.data>=da);
  if(a)chiuse=chiuse.filter(v=>v.data<=a);

  // Stats per agent
  const allChiuse=DB.visite.filter(v=>v.stato==='chiusa_visita');
  const statsByAgent={};
  AGENTS.forEach(ag=>{statsByAgent[ag]=allChiuse.filter(v=>v.agente===ag).length;});
  const weeksWithVisits=new Set(allChiuse.map(v=>v.data.slice(0,4)+'-W'+String(getWeekNumber(v.data)).padStart(2,'0')));
  const avgPerWeek=weeksWithVisits.size>0?(allChiuse.length/weeksWithVisits.size).toFixed(1):'0';

  // Group by year-week
  const grouped={};
  chiuse.forEach(v=>{
    const wn=getWeekNumber(v.data);
    const yr=v.data.slice(0,4);
    const key=yr+'-W'+String(wn).padStart(2,'0');
    if(!grouped[key])grouped[key]={year:yr,week:wn,visite:[]};
    grouped[key].visite.push(v);
  });
  const weeks=Object.keys(grouped).sort().reverse();

  document.getElementById('main-content').innerHTML=`
<div class="stats" style="grid-template-columns:repeat(4,1fr);margin-bottom:1rem">
  <div class="stat"><div class="stat-label">Visite chiuse totali</div><div class="stat-val">${allChiuse.length}</div><div class="stat-sub">tutte</div></div>
  <div class="stat"><div class="stat-label">${AGENTS[0].split(' ')[0]}</div><div class="stat-val">${statsByAgent[AGENTS[0]]||0}</div><div class="stat-sub">visite chiuse</div></div>
  <div class="stat"><div class="stat-label">${AGENTS[1].split(' ')[0]}</div><div class="stat-val">${statsByAgent[AGENTS[1]]||0}</div><div class="stat-sub">visite chiuse</div></div>
  <div class="stat"><div class="stat-label">Media settimanale</div><div class="stat-val">${avgPerWeek}</div><div class="stat-sub">visite/settimana</div></div>
</div>
<div class="card" style="padding:.75rem 1rem">
  <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
    <div><label>Agente</label><select onchange="renderStorico(this.value)" style="padding:7px 12px;border-radius:8px;border:0.5px solid var(--border);font-size:13px;background:var(--card);color:var(--t1)">
      <option value="" ${!af?'selected':''}>Tutti</option>
      ${AGENTS.map(ag=>'<option value="'+ag+'" '+(af===ag?'selected':'')+'>'+ag+'</option>').join('')}
    </select></div>
    <div><label>Da</label><input type="date" value="${da}" onchange="renderStorico(undefined,this.value)" style="padding:7px 10px;border-radius:8px;border:0.5px solid var(--border);font-size:13px"></div>
    <div><label>A</label><input type="date" value="${a}" onchange="renderStorico(undefined,undefined,this.value)" style="padding:7px 10px;border-radius:8px;border:0.5px solid var(--border);font-size:13px"></div>
    <button class="btn sm" onclick="storicoFiltri={agente:'',da:'',a:''};renderStorico()">Reset filtri</button>
    <div style="margin-left:auto"><button class="btn orange" onclick="exportStorico()">Esporta Excel</button></div>
  </div>
</div>
<div style="font-size:13px;color:var(--t2);margin:8px 0">${chiuse.length} visite trovate</div>
${weeks.length?weeks.map(key=>{
  const g=grouped[key];
  const dateDa=g.visite[g.visite.length-1].data;
  const dateA=g.visite[0].data;
  // Count per agent this week
  const agCounts=AGENTS.map(ag=>{const c=g.visite.filter(v=>v.agente===ag).length;return c?ag.split(' ')[0]+': '+c:'';}).filter(Boolean).join(' &middot; ');
  return`
<div class="card">
  <div class="card-title">
    <span>Settimana ${g.week} &mdash; ${g.year} <span style="font-size:12px;color:var(--t2);font-weight:400">(${dateDa} &rarr; ${dateA})</span></span>
    <span style="font-size:12px"><span style="font-weight:500;color:var(--c1)">${g.visite.length} visit${g.visite.length===1?'a':'e'}</span>${agCounts?' <span style="color:var(--t2)">&middot; '+agCounts+'</span>':''}</span>
  </div>
  <div class="tbl-wrap"><table>
  <thead><tr><th>Data</th><th>Ora</th><th>Agente</th><th>Cliente</th><th>Referente</th><th>Posizione</th><th>Tipo</th><th>Azione</th><th>Note post visita</th><th>Azioni</th></tr></thead>
  <tbody>${g.visite.map(v=>'<tr>'+
    '<td>'+v.data+'</td>'+
    '<td>'+v.ora+'</td>'+
    '<td style="font-size:12px">'+(v.agente||'')+'</td>'+
    '<td style="font-weight:500">'+v.cliente+'</td>'+
    '<td>'+(v.referente||'')+'</td>'+
    '<td style="font-size:12px">'+(v.posizioneContatto||'')+'</td>'+
    '<td><span class="badge '+v.tipo+'">'+v.tipo+'</span></td>'+
    '<td style="font-size:12px">'+(v.azione||'')+'</td>'+
    '<td style="font-size:12px;max-width:200px">'+(v.notePostVisita||'')+(((v.notePost||[]).length)?' <em style="color:var(--t2)">[+'+(v.notePost||[]).length+' note vocali]</em>':'')+'</td>'+
    '<td style="white-space:nowrap"><button class="btn sm" onclick="openVisitaModal('+v.id+')">Dettaglio</button> <button class="btn sm success" onclick="riaperiVisita('+v.id+')" title="Riapri visita">Riapri</button></td>'+
    '</tr>').join('')}
  </tbody></table></div>
</div>`;}).join(''):'<div class="card"><div class="empty">Nessuna visita chiusa trovata. Cambia lo stato di una visita in "Chiusa" per vederla qui.</div></div>'}`;
}

function riaperiVisita(id){
  if(!confirm('Riportare questa visita a stato "Confermata"?'))return;
  const v=DB.visite.find(x=>x.id==id);
  if(!v)return;
  v.stato='confermata';
  save();renderStorico();notify('Visita riaperta');
}

function exportStorico(){
  if(typeof XLSX==='undefined'){alert('Libreria Excel non caricata');return;}
  let vis=DB.visite.filter(v=>v.stato==='chiusa_visita').sort((a,b)=>b.data.localeCompare(a.data));
  if(storicoFiltri.agente)vis=vis.filter(v=>v.agente===storicoFiltri.agente);
  if(storicoFiltri.da)vis=vis.filter(v=>v.data>=storicoFiltri.da);
  if(storicoFiltri.a)vis=vis.filter(v=>v.data<=storicoFiltri.a);
  const rows=[['SETTIMANA','AGENTE','DATA VISITA','RAGIONE SOCIALE','NOME CONTATTO','POSIZIONE CONTATTO','TIPO','AZIONE DA INTRAPRENDERE','NOTE VISITA','NOTE POST VISITA']];
  vis.forEach(v=>{
    const wn='W'+String(getWeekNumber(v.data)).padStart(2,'0');
    const np=(v.notePost||[]).map(n=>n.testo).join(' | ');
    rows.push([wn,v.agente||'',v.data,v.cliente,v.referente||'',v.posizioneContatto||'',v.tipo||'',(v.azione||''),(v.note||'')+(np?' | '+np:''),(v.notePostVisita||'')]);
  });
  const wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:10},{wch:20},{wch:14},{wch:30},{wch:20},{wch:22},{wch:16},{wch:30},{wch:35},{wch:35}];
  XLSX.utils.book_append_sheet(wb,ws,'Storico Visite');
  XLSX.writeFile(wb,'IBS_Storico_Visite.xlsx');
  notify('Storico esportato: '+vis.length+' visite');
}

// DELETE & NAV
function deleteItem(col,id){
  if(!confirm('Eliminare questo elemento?'))return;
  DB[col]=DB[col].filter(x=>x.id!=id);save();
  const act=document.querySelector('.nav-tab.active').id.replace('tab-','');
  const map={clienti:renderClienti,lead:renderLead,offerte:renderOfferte,visite:renderVisite,storico:renderStorico,dashboard:renderDashboard};
  if(map[act])map[act]();notify('Eliminato','var(--re)');
}

function showTab(t){
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');stopVoice();
  ({dashboard:renderDashboard,clienti:renderClienti,lead:renderLead,offerte:renderOfferte,visite:renderVisite,storico:renderStorico})[t]();
}

// ======== PWA SETUP ========
(function setupPWA(){
  // Generate icons via canvas
  function generateIcon(size){
    const c=document.createElement('canvas');c.width=size;c.height=size;
    const ctx=c.getContext('2d');
    // Background
    const g=ctx.createLinearGradient(0,0,size,size);
    g.addColorStop(0,'#0D47A1');g.addColorStop(1,'#1976D2');
    ctx.fillStyle=g;
    const r=size*0.15;ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.fill();
    // Text "IBS"
    ctx.fillStyle='#FFFFFF';ctx.font='bold '+Math.round(size*0.28)+'px -apple-system,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('IBS',size/2,size*0.42);
    // "CRM" in accent color
    ctx.fillStyle='#FFB300';ctx.font='bold '+Math.round(size*0.18)+'px -apple-system,sans-serif';
    ctx.fillText('CRM',size/2,size*0.68);
    return c.toDataURL('image/png');
  }

  const icon192=generateIcon(192);
  const icon512=generateIcon(512);
  const icon180=generateIcon(180);

  // Apple touch icon
  const appleLink=document.createElement('link');
  appleLink.rel='apple-touch-icon';appleLink.href=icon180;
  document.head.appendChild(appleLink);

  // Favicon
  const favLink=document.createElement('link');
  favLink.rel='icon';favLink.type='image/png';favLink.href=generateIcon(32);
  document.head.appendChild(favLink);

  // Manifest
  const manifest={
    name:'IBS CRM',
    short_name:'IBS CRM',
    description:'CRM per agenti commerciali IBS - Gestione clienti, lead, offerte e visite',
    start_url:location.href.split('?')[0],
    display:'standalone',
    orientation:'any',
    background_color:'#0D47A1',
    theme_color:'#0D47A1',
    lang:'it',
    categories:['business','productivity'],
    icons:[
      {src:icon192,sizes:'192x192',type:'image/png',purpose:'any maskable'},
      {src:icon512,sizes:'512x512',type:'image/png',purpose:'any maskable'}
    ]
  };
  const manifestBlob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const manifestURL=URL.createObjectURL(manifestBlob);
  const manifestLink=document.createElement('link');
  manifestLink.rel='manifest';manifestLink.href=manifestURL;
  document.head.appendChild(manifestLink);

  // Service Worker (inline via blob)
  const swCode=`
    const CACHE='ibs-crm-v4';
    const ASSETS=[self.location.href.split('?')[0]];
    self.addEventListener('install',e=>{
      e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)).then(()=>self.skipWaiting()));
    });
    self.addEventListener('activate',e=>{
      e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));
    });
    self.addEventListener('fetch',e=>{
      if(e.request.method!=='GET')return;
      // For CDN resources (SheetJS), try network first
      if(e.request.url.includes('cdn.sheetjs.com')){
        e.respondWith(
          fetch(e.request).then(r=>{
            const rc=r.clone();caches.open(CACHE).then(c=>c.put(e.request,rc));return r;
          }).catch(()=>caches.match(e.request))
        );
        return;
      }
      // For same-origin, cache first then network
      e.respondWith(
        caches.match(e.request).then(cached=>{
          const fetchPromise=fetch(e.request).then(r=>{
            if(r.ok){const rc=r.clone();caches.open(CACHE).then(c=>c.put(e.request,rc));}return r;
          }).catch(()=>cached);
          return cached||fetchPromise;
        })
      );
    });
  `;

  if('serviceWorker' in navigator){
    const swBlob=new Blob([swCode],{type:'application/javascript'});
    const swURL=URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swURL,{scope:'/'}).catch(()=>{
      // Blob SW may fail due to scope restrictions — that's OK, PWA still works for Add to Home Screen
      console.log('Service Worker via blob not supported, PWA install still available via manifest');
    });
  }

  // iOS install prompt (shows only in Safari, not standalone)
  if(navigator.standalone===false||
    (navigator.userAgent.match(/iPhone|iPad/)&&!window.matchMedia('(display-mode:standalone)').matches)){
    setTimeout(()=>{
      if(sessionStorage.getItem('ibs_ios_prompt'))return;
      const banner=document.createElement('div');
      banner.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E0E0E0;padding:16px 20px;z-index:9999;display:flex;align-items:center;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,.1);font-family:-apple-system,sans-serif';
      banner.innerHTML='<div style="flex:1"><div style="font-size:14px;font-weight:600;color:#212121">Installa IBS CRM</div><div style="font-size:12px;color:#757575;margin-top:2px">Tocca <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2" style="vertical-align:middle"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> poi <strong>"Aggiungi a Home"</strong></div></div><button onclick="this.parentElement.remove();sessionStorage.setItem(\'ibs_ios_prompt\',1)" style="background:none;border:none;font-size:22px;color:#757575;cursor:pointer;padding:4px">&times;</button>';
      document.body.appendChild(banner);
    },3000);
  }

  // Android/Chrome install prompt
  let deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();deferredPrompt=e;
    setTimeout(()=>{
      if(sessionStorage.getItem('ibs_android_prompt'))return;
      const banner=document.createElement('div');
      banner.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E0E0E0;padding:16px 20px;z-index:9999;display:flex;align-items:center;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,.1);font-family:-apple-system,sans-serif';
      banner.innerHTML='<div style="flex:1"><div style="font-size:14px;font-weight:600;color:#212121">Installa IBS CRM</div><div style="font-size:12px;color:#757575;margin-top:2px">Usa l\'app come un\'applicazione nativa</div></div><button id="pwa-install-btn" style="background:#0D47A1;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500">Installa</button><button onclick="this.parentElement.remove();sessionStorage.setItem(\'ibs_android_prompt\',1)" style="background:none;border:none;font-size:22px;color:#757575;cursor:pointer;padding:4px">&times;</button>';
      document.body.appendChild(banner);
      document.getElementById('pwa-install-btn').addEventListener('click',()=>{
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(()=>{deferredPrompt=null;banner.remove();});
      });
    },3000);
  });
})();
